<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic QR Code Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
        }
        
        #timestamp {
            font-size: 18px;
            margin: 10px 0;
            color: #333;
        }
        
        #countdown {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic QR Code Generator</h1>
        <p>QR Code changes every 10 seconds based on current time</p>
        
        <div id="timestamp"></div>
        <div id="countdown"></div>
        <div id="qrcode"></div>
        
        <button onclick="startGenerator()" id="startBtn">Start Generator</button>
        <button onclick="stopGenerator()" id="stopBtn" disabled>Stop Generator</button>
    </div>

    <!-- Include QRCode library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
